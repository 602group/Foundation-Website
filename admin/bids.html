<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 220px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .search-box input:focus {
            border-color: #4A90E2;
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .users-table-wrap {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: #f8f9fa;
            padding: 0.9rem 1rem;
            text-align: left;
            font-size: 0.82rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 1px solid #eee;
        }

        tbody td {
            padding: 1rem;
            font-size: 0.88rem;
            color: #333;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        .user-name-cell strong {
            display: block;
        }

        .user-name-cell span {
            font-size: 0.78rem;
            color: #888;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-active {
            background: #e8f8f0;
            color: #1a9e5c;
        }

        .badge-outbid {
            background: #fff0f0;
            color: #e74c3c;
        }

        .badge-won {
            background: #e8f0ff;
            color: #4A90E2;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #aaa;
        }

        .stat-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .mini-stat {
            background: white;
            border-radius: 12px;
            padding: 1.2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .mini-stat .label {
            font-size: 0.8rem;
            color: #888;
        }

        .mini-stat .value {
            font-size: 1.6rem;
            font-weight: 800;
            color: #000;
        }

        .amount {
            font-family: monospace;
            font-weight: 700;
            font-size: 1rem;
        }

        .delete-bid-btn {
            background: #fff0f0;
            color: #e74c3c;
            border: 1.5px solid #fecaca;
            border-radius: 6px;
            padding: 0.25rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.15s;
        }

        .delete-bid-btn:hover {
            background: #fee2e2;
        }
    </style>
</head>

<body>
                    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo">EPIC ADMIN</a>
        </div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item" data-section="dashboard"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="auctions.html" class="nav-item" data-section="auctions"><span class="nav-icon">⛳</span> Auctions</a>
            <a href="users.html" class="nav-item" data-section="users"><span class="nav-icon">👥</span> Users</a>
            <a href="events.html" class="nav-item" data-section="events"><span class="nav-icon">✈️</span> Events &amp; Trips</a>
            <a href="messages.html" class="nav-item" data-section="messages"><span class="nav-icon">💬</span> Messages</a>
            <a href="tasks.html" class="nav-item" data-section="tasks"><span class="nav-icon">✅</span> Tasks</a>
            <a href="financials.html" class="nav-item" data-section="financials"><span class="nav-icon">📈</span> Financials</a>
            <a href="newsletter.html" class="nav-item" data-section="newsletter"><span class="nav-icon">📧</span> Newsletter</a>
            <a href="bids.html" class="nav-item active" data-section="bids"><span class="nav-icon">💰</span> Bids</a>
            <a href="settings.html" class="nav-item" data-section="settings"><span class="nav-icon">⚙️</span> Settings</a>
        </nav>
        <div class="user-profile">
            <div class="avatar"></div>
            <div class="user-info">
                <h4>Admin User</h4>
                <p>admin@epic.org</p>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <header class="top-header">
            <h2 class="page-title">Bids Ledger</h2>
        </header>

        <div class="content-wrapper">
            <div class="stat-row">
                <div class="mini-stat">
                    <div class="label">Total Bids</div>
                    <div class="value" id="statTotalBids">0</div>
                </div>
                <div class="mini-stat">
                    <div class="label">Amount Pledged</div>
                    <div class="value" id="statTotalValue">$0</div>
                </div>
                <div class="mini-stat">
                    <div class="label">Avg Bid Size</div>
                    <div class="value" id="statAvgBid">$0</div>
                </div>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search by user, item, or status…"
                        oninput="renderTable()">
                </div>
            </div>

            <div class="users-table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Bidder</th>
                            <th>Auction Item</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bidsTbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../db.js"></script>
    <script src="../auth.js"></script>
    <script>
        const USERS_KEY = 'epic_users';

        function loadAllBids() {
            try {
                const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
                let allBids = [];
                users.forEach(u => {
                    const userBids = u.bids || [];
                    userBids.forEach(b => {
                        if (typeof b === 'object' && typeof b.title !== 'undefined') {
                            allBids.push({
                                ...b,
                                userId: u.id,
                                bidderName: u.firstName + ' ' + (u.lastName || ''),
                                bidderEmail: u.email
                            });
                        }
                    });

                    const userPurchases = u.purchases || [];
                    userPurchases.forEach(p => {
                        if (typeof p === 'object' && typeof p.title !== 'undefined') {
                            allBids.push({
                                ...p,
                                status: 'won', // Treat purchases as 'won' bids for the ledger
                                userId: u.id,
                                bidderName: u.firstName + ' ' + (u.lastName || ''),
                                bidderEmail: u.email
                            });
                        }
                    });
                });

                // Sort by date descending
                allBids.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
                return allBids;
            } catch (e) {
                console.error("Error loading bids", e);
                return [];
            }
        }

        function deleteBid(userId, auctionId, amountStr, title) {
            if (!confirm(`Are you absolutely sure you want to permanently delete the $${amountStr} bid for "${title}"?\n\nThis will instantly remove the bid from the user's active profile and recalculate the auction's current price.`)) return;

            const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
            const userIndex = users.findIndex(u => u.id === userId);

            if (userIndex === -1) {
                alert("Could not find the user associated with this bid.");
                return;
            }

            const user = users[userIndex];
            const amount = Number(amountStr);
            let bidRemoved = false;

            // 1. Remove from User's Bids array natively
            if (user.bids) {
                const initialLength = user.bids.length;
                // We use findIndex and splice one by one in case there are identical amounts, we just remove one
                const bidIndex = user.bids.findIndex(b => b.auctionId === auctionId && Number(b.amount) === amount);
                if (bidIndex !== -1) {
                    user.bids.splice(bidIndex, 1);
                    bidRemoved = true;
                }
            }

            // (Optional fallback: Check purchases if someone tries to delete a buy-now)
            if (!bidRemoved && user.purchases) {
                const purchaseIndex = user.purchases.findIndex(p => p.auctionId === auctionId && Number(p.amount) === amount);
                if (purchaseIndex !== -1) {
                    user.purchases.splice(purchaseIndex, 1);
                    bidRemoved = true;
                }
            }

            if (!bidRemoved) {
                alert("Bid could not be found to delete. It may have already been removed.");
                return;
            }

            // Save modified users payload back to localStorage and server
            const updatedUser = users[userIndex];
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
            if (typeof EPICDB !== 'undefined') EPICDB.saveUser(updatedUser).catch(console.warn);

            // 2. Adjust the global Auction metrics inside epic_auctions
            try {
                const auctions = JSON.parse(localStorage.getItem('epic_auctions')) || [];
                const auctionIndex = auctions.findIndex(a => a.id === auctionId);

                if (auctionIndex !== -1) {
                    const auc = auctions[auctionIndex];

                    // Decrement global bid count
                    if (auc.bidCount > 0) auc.bidCount -= 1;
                    if (auc.bids > 0) auc.bids -= 1; // Used in some older code references

                    // We must determine the "next highest" bid globally across all users to properly set the currentBid & highestBidder
                    let secondHighestBidAmount = auc.startBid || 0;
                    let secondHighestBidder = '';

                    // Re-scan ALL users to gather the absolute highest remaining bid globally
                    users.forEach(u => {
                        (u.bids || []).forEach(b => {
                            if (b.auctionId === auctionId && Number(b.amount) > secondHighestBidAmount) {
                                secondHighestBidAmount = Number(b.amount);
                                secondHighestBidder = u.email;
                            }
                        });
                    });

                    // Apply this correct rollback to the auction global pool
                    auc.currentBid = secondHighestBidAmount;
                    auc.highestBidder = secondHighestBidder;

                    // Save modified auction payload
                    localStorage.setItem('epic_auctions', JSON.stringify(auctions));
                }
            } catch (err) {
                console.error("Failed to intelligently recalculate global auction data:", err);
            }

            renderTable();
        }

        function renderStats(bids) {
            document.getElementById('statTotalBids').textContent = bids.length;

            // Amount Pledged = sum of the WINNING (highest) bid per auction, not every bid added up
            let totalPledged = 0;
            try {
                const auctions = JSON.parse(localStorage.getItem('epic_auctions') || '[]');
                auctions.forEach(a => {
                    if (a.currentBid && a.currentBid > 0) {
                        totalPledged += Number(a.currentBid);
                    }
                });
            } catch (e) { }
            document.getElementById('statTotalValue').textContent = '$' + totalPledged.toLocaleString();

            // Avg Bid Size = average of all individual bids (still useful for the admin)
            const allAmounts = bids.map(b => Number(b.amount) || 0).filter(n => n > 0);
            const avgBid = allAmounts.length > 0 ? Math.round(allAmounts.reduce((s, n) => s + n, 0) / allAmounts.length) : 0;
            document.getElementById('statAvgBid').textContent = '$' + avgBid.toLocaleString();
        }

        function renderTable() {
            const allBids = loadAllBids();
            const q = document.getElementById('searchInput').value.toLowerCase().trim();

            const list = q ? allBids.filter(b =>
                (b.bidderName || '').toLowerCase().includes(q) ||
                (b.title || '').toLowerCase().includes(q) ||
                (b.status || '').toLowerCase().includes(q) ||
                (b.amount && b.amount.toString().includes(q))
            ) : allBids;

            renderStats(allBids);

            const tbody = document.getElementById('bidsTbody');
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No bids found on the platform yet.</div></td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(b => {
                const dateStr = b.date ? new Date(b.date).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';

                let badgeClass = 'badge-active';
                if (b.status === 'outbid') badgeClass = 'badge-outbid';
                if (b.status === 'won') badgeClass = 'badge-won';

                return `
                    <tr>
                        <td style="color:#888; font-size:0.8rem;">${dateStr}</td>
                        <td class="user-name-cell">
                            <strong><a href="user-profile?id=${b.userId}" style="color:#000;text-decoration:none;">${b.bidderName}</a></strong>
                            <span>${b.bidderEmail}</span>
                        </td>
                        <td><strong>${b.title}</strong></td>
                        <td class="amount">$${(b.amount || 0).toLocaleString()}</td>
                        <td><span class="badge ${badgeClass}">${(b.status || 'Active').toUpperCase()}</span></td>
                        <td>
                            <div style="display:flex; align-items:center; gap:0.6rem;">
                                <a href="user-profile?id=${b.userId}" style="text-decoration:none; color:#4A90E2; font-weight:600; font-size:0.8rem;">View Bidder</a>
                                <button class="delete-bid-btn" onclick="deleteBid('${b.userId}', '${b.auctionId}', '${b.amount}', '${b.title.replace(/'/g, "\\'")}')">✕ Drop</button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        }

        // Wait for db.js to load fresh data before rendering
        (async function init() {
            const tbody = document.getElementById('bidsTbody');
            tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state">Loading bids from database…</div></td></tr>';
            if (typeof EPICDB !== 'undefined') {
                await EPICDB.init();
            }
            renderTable();
        })();
    </script>
</body>
