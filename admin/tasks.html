<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - EPIC Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .panel-box {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .panel-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
        }

        .add-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.45rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .add-btn:hover {
            opacity: 0.8;
        }

        tbody tr {
            cursor: pointer;
        }

        tbody tr:hover {
            background: #f0f4ff !important;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .ftab {
            padding: 0.4rem 1rem;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            background: #fff;
            color: #555;
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .ftab:hover {
            border-color: #000;
            color: #000;
        }

        .ftab.active {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .toolbar-right {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex: 1;
            max-width: 500px;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        .type-select {
            padding: 0.6rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            outline: none;
            background: white;
            cursor: pointer;
        }

        .drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 500;
        }

        .drawer-overlay.open {
            display: block;
        }

        .event-drawer {
            position: fixed;
            top: 0;
            right: -700px;
            width: 540px;
            height: 100vh;
            background: white;
            box-shadow: -4px 0 30px rgba(0, 0, 0, 0.15);
            z-index: 600;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .event-drawer.open {
            right: 0;
        }

        .drawer-head {
            padding: 1.5rem 2rem 1rem;
            border-bottom: 1px solid #eee;
        }

        .drawer-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }

        .close-drawer {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #555;
        }

        .form-control {
            width: 100%;
            padding: 0.65rem 0.8rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .drawer-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            background: #fafafa;
        }

        .btn-cancel {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            background: white;
            color: #555;
            border: 1px solid #ddd;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        .btn-save {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            background: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        .btn-delete {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            background: #fdecea;
            color: #e53935;
            border: none;
            cursor: pointer;
            margin-right: auto;
            font-family: 'Poppins', sans-serif;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #aaa;
        }

        .cat-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .cat-auction {
            background: #3b82f6;
        }

        .cat-event {
            background: #8b5cf6;
        }

        .cat-trip {
            background: #14b8a6;
        }

        .cat-general {
            background: #64748b;
        }

        .row-done {
            opacity: 0.5;
        }

        .row-done td {
            text-decoration: line-through;
        }

        .quick-check {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #ccc;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: transparent;
            transition: all 0.2s;
        }

        .quick-check svg {
            width: 12px;
            height: 12px;
        }

        .quick-check:hover {
            border-color: #000;
        }

        .quick-check.checked {
            background: #10b981;
            border-color: #10b981;
            color: white;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header"><a href="../index.html" class="logo">EPIC ADMIN</a></div>
        <nav class="nav-links">
            <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="auctions.html" class="nav-item"><span class="nav-icon">⛳</span> Auctions</a>
            <a href="users.html" class="nav-item"><span class="nav-icon">👥</span> Users</a>
            <a href="bids.html" class="nav-item"><span class="nav-icon">💰</span> Bids</a>
            <a href="events.html" class="nav-item"><span class="nav-icon">✈️</span> Events &amp; Trips</a>
            <a href="messages.html" class="nav-item"><span class="nav-icon">💬</span> Messages</a>
            <a href="tasks.html" class="nav-item active"><span class="nav-icon">✅</span> Tasks</a>
            <a href="financials.html" class="nav-item"><span class="nav-icon">📈</span> Financials</a>
            <a href="newsletter.html" class="nav-item"><span class="nav-icon">📧</span> Newsletter</a>
            <a href="#" class="nav-item"><span class="nav-icon">⚙️</span> Settings</a>
        </nav>
        <div class="user-profile">
            <div class="avatar"></div>
            <div class="user-info">
                <h4>Admin User</h4>
                <p>admin@epic.org</p>
            </div>
        </div>
    </aside>

    <div class="main-content">
        <header class="top-header">
            <h2 class="page-title">Tasks</h2>
        </header>

        <div class="content-wrapper">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">Total Tasks</span>
                    <span class="stat-value" id="sTotal">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">To Do</span>
                    <span class="stat-value" id="sTodo" style="color:#f39c12">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">In Progress</span>
                    <span class="stat-value" id="sProgress" style="color:#3498db">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="sDone" style="color:#2ecc71">0</span>
                </div>
            </div>

            <div class="panel-box">
                <div class="panel-header">
                    <h2>Task Ledger</h2>
                    <button class="add-btn" onclick="openDrawer()">+ New Task</button>
                </div>

                <div class="toolbar">
                    <div class="filter-tabs">
                        <button class="ftab active" onclick="setFilter('all',this)">All</button>
                        <button class="ftab" onclick="setFilter('todo',this)">To Do</button>
                        <button class="ftab" onclick="setFilter('scheduled',this)">Scheduled</button>
                        <button class="ftab" onclick="setFilter('in_progress',this)">In Prog</button>
                        <button class="ftab" onclick="setFilter('completed',this)">Done</button>
                        <button class="ftab" onclick="setFilter('my',this)">Assigned to Me</button>
                    </div>
                    <div class="toolbar-right">
                        <select id="typeFilter" class="type-select" onchange="render()">
                            <option value="all">All Types</option>
                            <option value="auction">Auctions</option>
                            <option value="event">Events</option>
                            <option value="trip">Trips</option>
                            <option value="general">General</option>
                        </select>
                        <div class="search-box">
                            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8" />
                                <path d="m21 21-4.35-4.35" />
                            </svg>
                            <input type="text" id="searchInput" placeholder="Search tasks…" oninput="render()">
                        </div>
                    </div>
                </div>

                <div class="table-responsive" style="overflow-x:auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width:50px"></th>
                                <th>Category</th>
                                <th>Task Title</th>
                                <th>Due Date</th>
                                <th>Assignee</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tasksTbody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Drawer -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="event-drawer" id="taskDrawer">
        <div class="drawer-head">
            <div class="drawer-top-row">
                <h3 class="drawer-title" id="dHeaderTitle">Create Task</h3>
                <button class="close-drawer" onclick="closeDrawer()">✕</button>
            </div>
        </div>
        <div class="drawer-body">
            <input type="hidden" id="dId">
            <input type="hidden" id="dIsAuto">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="dTitle" class="form-control" placeholder="Task title...">
            </div>
            <div class="form-group">
                <label>Description / Notes</label>
                <textarea id="dDesc" class="form-control"
                    placeholder="Provide details, suggested captions, links to assets..."></textarea>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Category</label>
                    <select id="dCategory" class="form-control">
                        <option value="general">General</option>
                        <option value="auction">Auction</option>
                        <option value="event">Event</option>
                        <option value="trip">Trip</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Due Date</label>
                    <input type="date" id="dDate" class="form-control">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Assignee</label>
                    <select id="dAssignee" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="dStatus" class="form-control">
                        <option value="todo">To Do</option>
                        <option value="scheduled">Scheduled</option>
                        <option value="in_progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="drawer-footer">
            <button class="btn-delete" id="btnDelete" onclick="deleteTask()">Delete</button>
            <button class="btn-cancel" onclick="closeDrawer()">Cancel</button>
            <button class="btn-save" onclick="saveTask()">Save Task</button>
        </div>
    </div>

    <script src="../shared-auctions.js"></script>
    <script src="../shared-events.js"></script>
    <script src="../db.js"></script>
    <script src="../auth.js"></script>
    <script>
        const TASKS_KEY = 'epic_tasks';
        let allTasks = [];
        let assignedUsersMap = {};
        let currentFilter = 'all';

        function initUsers() {
            let users = [];
            try { users = JSON.parse(localStorage.getItem('epic_users') || '[]'); } catch (e) { }
            if (!users.length) {
                users = [
                    { id: 'admin1', firstName: 'Admin', lastName: 'User', email: 'admin@epic.org' },
                    { id: 'usr_james', firstName: 'James', lastName: 'Bond', email: 'jbond@epic.org' }
                ];
            }
            let opts = '<option value="">Unassigned</option>';
            users.forEach(u => {
                assignedUsersMap[u.id] = `${u.firstName} ${u.lastName}`;
                opts += `<option value="${u.id}">${u.firstName} ${u.lastName} (${u.email})</option>`;
            });
            document.getElementById('dAssignee').innerHTML = opts;
        }

        function generateAutoTasks() {
            const autoTasks = [];
            const fmtD = (daysFromNow) => {
                const d = new Date();
                d.setDate(d.getDate() + daysFromNow);
                return d.toISOString().split('T')[0];
            };
            autoTasks.push({ id: 'seed_gen_1', title: 'Review Quarterly Financials', desc: 'Go over P&L', date: fmtD(0), category: 'general', status: 'todo', assignedTo: 'admin1', isAuto: true });
            autoTasks.push({ id: 'seed_auc_1', title: 'Auction Launch Teaser', desc: 'Post social media', date: fmtD(3), category: 'auction', status: 'todo', assignedTo: 'usr_james', isAuto: true });
            autoTasks.push({ id: 'seed_evt_1', title: 'Event Registration Open', desc: 'Charity Gala', date: fmtD(7), category: 'event', status: 'in_progress', assignedTo: '', isAuto: true });
            autoTasks.push({ id: 'seed_trp_1', title: 'Finalize Pebble Beach Itinerary', desc: 'Confirm tees', date: fmtD(-2), category: 'trip', status: 'todo', assignedTo: 'admin1', isAuto: true });
            return autoTasks;
        }

        function refreshTasks() {
            initUsers();
            let saved = {};
            try { saved = JSON.parse(localStorage.getItem(TASKS_KEY)) || {}; } catch (e) { }
            const autoBase = generateAutoTasks();
            const finalTasks = [];

            autoBase.forEach(task => {
                if (saved[task.id]) {
                    if (saved[task.id].deleted) return;
                    Object.assign(task, saved[task.id]);
                }
                finalTasks.push(task);
            });

            Object.values(saved).forEach(task => {
                if (task.isManual && !task.deleted) finalTasks.push(task);
            });

            finalTasks.sort((a, b) => {
                if (a.status === 'completed' && b.status !== 'completed') return 1;
                if (a.status !== 'completed' && b.status === 'completed') return -1;
                if (!a.date) return 1;
                if (!b.date) return -1;
                return new Date(a.date) - new Date(b.date);
            });

            allTasks = finalTasks;
            render();
        }

        function toggleComplete(id, event) {
            if (event) event.stopPropagation();
            let saved = {};
            try { saved = JSON.parse(localStorage.getItem(TASKS_KEY)) || {}; } catch (e) { }
            const t = allTasks.find(x => x.id === id);
            if (!t) return;
            const newStatus = t.status === 'completed' ? 'todo' : 'completed';

            if (t.isAuto) saved[id] = { ...saved[id], status: newStatus };
            else { if (!saved[id]) saved[id] = {}; saved[id].status = newStatus; }
            localStorage.setItem(TASKS_KEY, JSON.stringify(saved));
            refreshTasks();
        }

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
            let list = allTasks;

            if (currentFilter === 'all') list = list.filter(t => t.status !== 'completed');
            else if (currentFilter !== 'my') list = list.filter(t => t.status === currentFilter);
            if (currentFilter === 'my') {
                let cuid = '';
                try { cuid = AUTH.currentUser().id; } catch (e) { }
                list = list.filter(t => t.assignedTo === cuid);
            }

            const typeQ = document.getElementById('typeFilter').value;
            if (typeQ !== 'all') list = list.filter(t => t.category === typeQ);
            if (q) list = list.filter(t => (t.title + t.desc).toLowerCase().includes(q));

            document.getElementById('sTotal').textContent = allTasks.length;
            document.getElementById('sTodo').textContent = allTasks.filter(t => t.status === 'todo').length;
            document.getElementById('sProgress').textContent = allTasks.filter(t => t.status === 'in_progress').length;
            document.getElementById('sDone').textContent = allTasks.filter(t => t.status === 'completed').length;

            const tbody = document.getElementById('tasksTbody');
            if (!list.length) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No tasks found.</div></td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(t => {
                const isDone = t.status === 'completed';
                const catClass = 'cat-' + (t.category || 'general');
                const catName = (t.category || '').charAt(0).toUpperCase() + (t.category || '').slice(1);

                const statLabel = { todo: 'To Do', scheduled: 'Scheduled', in_progress: 'In Progress', completed: 'Completed' }[t.status];
                const statColor = { todo: 'status-pending', scheduled: 'status-pending', in_progress: 'status-active', completed: 'status-closed' }[t.status] || 'status-pending';

                let dispDate = 'No date';
                let dateStyle = '';
                if (t.date) {
                    const dStr = new Date(t.date).toLocaleDateString();
                    const taskD = new Date(t.date); taskD.setHours(0, 0, 0, 0);
                    const today = new Date(); today.setHours(0, 0, 0, 0);
                    if (taskD < today && !isDone) { dispDate = `⚠️ Past Due (${dStr})`; dateStyle = 'color:#e74c3c; font-weight:600;'; }
                    else if (taskD.getTime() === today.getTime() && !isDone) { dispDate = `📅 Today`; dateStyle = 'color:#f39c12; font-weight:600;'; }
                    else { dispDate = dStr; }
                }

                const dispAssignee = assignedUsersMap[t.assignedTo] || 'Unassigned';

                return `<tr class="${isDone ? 'row-done' : ''}" onclick="openDrawer('${t.id}')">
                    <td onclick="event.stopPropagation()">
                        <button class="quick-check ${isDone ? 'checked' : ''}" onclick="toggleComplete('${t.id}', event)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </button>
                    </td>
                    <td><span class="cat-indicator ${catClass}"></span>${catName}</td>
                    <td><strong>${t.title}</strong><br><small style="color:#888">${t.desc ? t.desc.slice(0, 50) + '...' : ''}</small></td>
                    <td style="${dateStyle}">${dispDate}</td>
                    <td>${dispAssignee}</td>
                    <td><span class="status-badge ${statColor}">${statLabel}</span></td>
                </tr>`;
            }).join('');
        }

        function openDrawer(id = null) {
            const el = i => document.getElementById(i);
            if (id) {
                const t = allTasks.find(x => x.id === id);
                el('dHeaderTitle').textContent = 'Edit Task';
                el('dId').value = t.id;
                el('dIsAuto').value = t.isAuto ? '1' : '0';
                el('dTitle').value = t.title || '';
                el('dDesc').value = t.desc || '';
                el('dCategory').value = t.category || 'general';
                el('dDate').value = t.date || '';
                el('dAssignee').value = t.assignedTo || '';
                el('dStatus').value = t.status || 'todo';
                el('btnDelete').style.display = 'block';
            } else {
                el('dHeaderTitle').textContent = 'New Task';
                el('dId').value = 'task_' + Date.now();
                el('dIsAuto').value = '0';
                el('dTitle').value = '';
                el('dDesc').value = '';
                el('dCategory').value = 'general';
                el('dDate').value = new Date().toISOString().split('T')[0];
                el('dAssignee').value = '';
                el('dStatus').value = 'todo';
                el('btnDelete').style.display = 'none';
            }
            el('drawerOverlay').classList.add('open');
            el('taskDrawer').classList.add('open');
        }

        function closeDrawer() {
            document.getElementById('drawerOverlay').classList.remove('open');
            document.getElementById('taskDrawer').classList.remove('open');
        }

        function saveTask() {
            const el = i => document.getElementById(i);
            const id = el('dId').value;
            let saved = {};
            try { saved = JSON.parse(localStorage.getItem(TASKS_KEY)) || {}; } catch (e) { }
            const tObj = { title: el('dTitle').value.trim(), desc: el('dDesc').value.trim(), category: el('dCategory').value, date: el('dDate').value, assignedTo: el('dAssignee').value, status: el('dStatus').value };
            if (el('dIsAuto').value !== '1') { tObj.id = id; tObj.isManual = true; }
            saved[id] = { ...saved[id], ...tObj };
            localStorage.setItem(TASKS_KEY, JSON.stringify(saved));
            closeDrawer();
            refreshTasks();
        }

        function deleteTask() {
            const id = document.getElementById('dId').value;
            let saved = {};
            try { saved = JSON.parse(localStorage.getItem(TASKS_KEY)) || {}; } catch (e) { }
            if (!saved[id]) saved[id] = {};
            saved[id].deleted = true;
            localStorage.setItem(TASKS_KEY, JSON.stringify(saved));
            closeDrawer();
            refreshTasks();
        }

        document.addEventListener('DOMContentLoaded', refreshTasks);
    </script>
