<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist - EPIC Foundation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f8;
            min-height: 100vh;
        }

        .portal-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            margin-top: 100px;
        }

        .page-heading {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .page-sub {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            text-decoration: none;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #000;
        }

        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }

        .watchlist-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .watchlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .wl-image {
            width: 100%;
            height: 180px;
            background: #e0e0e0 center/cover no-repeat;
        }

        .wl-content {
            padding: 1rem;
        }

        .wl-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            color: #000;
        }

        .wl-location {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.6rem;
        }

        .wl-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .wl-bid {
            font-weight: 700;
            font-size: 1rem;
            color: #000;
        }

        .wl-remove {
            background: none;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            color: #e74c3c;
            transition: all 0.2s;
        }

        .wl-remove:hover {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .empty-state .em-icon {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 1.5rem;
        }

        .browse-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 0.7rem 1.8rem;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .browse-btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <header class="page-header">
        <a href="../index.html" class="logo">EPIC Foundation</a>
        <nav class="nav-menu">
            <a href="../auctions.html" class="nav-link">Auction</a>
            <a href="../travel-events.html" class="nav-link">Travel & Events</a>
            <a href="../about.html" class="nav-link">About Us</a>
            <a href="../contact.html" class="nav-link">Contact Us</a>
            <button class="login-btn">Login</button>
        </nav>
    </header>

    <div class="portal-wrapper">
        <a href="index.html" class="back-link">← Back to Dashboard</a>
        <h1 class="page-heading">My Watchlist</h1>
        <p class="page-sub">Auctions you're watching — get notified when they're ending soon.</p>

        <div id="watchlist-container"></div>
    </div>

    <script src="../auth.js"></script>
    <script src="../shared-auctions.js"></script>
    <script>
        const session = AUTH.currentUser();
        if (!session) { window.location.href = '../login.html'; }

        AUTH.applyHeader('../');

        const allUsers = JSON.parse(localStorage.getItem('epic_users') || '[]');
        const user = (session && allUsers.find(u => u.id === session.id)) || session;
        const watchlist = user.watchlist || [];
        const allAuctions = loadSharedAuctions();

        const container = document.getElementById('watchlist-container');

        if (watchlist.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="em-icon">👁️</div>
                    <h3>Your watchlist is empty</h3>
                    <p>Save auctions you're interested in to keep track of them here.</p>
                    <a href="../auctions.html" class="browse-btn">Browse Auctions</a>
                </div>`;
        } else {
            const watched = watchlist.map(id => allAuctions.find(a => a.id === id)).filter(Boolean);
            if (watched.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="em-icon">👁️</div>
                        <h3>No matching auctions found</h3>
                        <p>Your saved auctions may have ended.</p>
                        <a href="../auctions.html" class="browse-btn">Browse Auctions</a>
                    </div>`;
            } else {
                container.innerHTML = `<div class="watchlist-grid">${watched.map(a => {
                    const thumb = a.images && a.images[0] ? a.images[0] : '';
                    const price = a.currentBid || a.startBid || 0;
                    return `
                    <div class="watchlist-card">
                        <a href="../auction-rounds/pebble-beach-round-2.html?id=${a.id}" style="text-decoration:none;color:inherit;">
                            <div class="wl-image" style="background-image:url(${thumb})"></div>
                            <div class="wl-content">
                                <div class="wl-title">${a.title}</div>
                                <div class="wl-location">${a.location}</div>
                                <div class="wl-footer">
                                    <span class="wl-bid">$${price.toLocaleString()}</span>
                                    <button class="wl-remove" onclick="event.preventDefault();removeFromWatchlist('${a.id}',this)">Remove</button>
                                </div>
                            </div>
                        </a>
                    </div>`;
                }).join('')}</div>`;
            }
        }

        function removeFromWatchlist(auctionId, btn) {
            const users = JSON.parse(localStorage.getItem('epic_users') || '[]');
            const idx = users.findIndex(u => u.id === user.id);
            if (idx !== -1) {
                users[idx].watchlist = (users[idx].watchlist || []).filter(id => id !== auctionId);
                localStorage.setItem('epic_users', JSON.stringify(users));
                AUTH.logout && AUTH.updateProfile && AUTH.updateProfile({ watchlist: users[idx].watchlist });
            }
            btn.closest('.watchlist-card').style.opacity = '0.4';
            btn.textContent = 'Removed';
            btn.disabled = true;
        }
    </script>
</body>

</html>
