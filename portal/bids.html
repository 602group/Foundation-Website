<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bids - EPIC Foundation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f8;
            min-height: 100vh;
        }

        .portal-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            margin-top: 100px;
        }

        .page-heading {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .page-sub {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            text-decoration: none;
            margin-bottom: 1.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #000;
        }

        .section-card {
            background: #fff;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }

        .section-card h3 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid #f0f0f0;
            color: #000;
        }

        .bid-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            background: #f8f9fa;
            margin-bottom: 0.6rem;
            transition: background 0.15s;
            font-size: 0.88rem;
            font-weight: 500;
        }

        .bid-row:hover {
            background: #000;
            color: #fff;
        }

        .bid-row:hover .bid-amount {
            color: #fff;
        }

        .bid-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .bid-amount {
            font-weight: 700;
            color: #000;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .bid-status {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 12px;
            margin-left: 0.5rem;
        }

        .status-active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-won {
            background: #fff8e1;
            color: #f57f17;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #bbb;
        }

        .empty-state .em-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            color: #888;
        }

        .browse-btn {
            display: inline-block;
            background: #000;
            color: #fff;
            padding: 0.65rem 1.6rem;
            border-radius: 25px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.88rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .browse-btn:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <header class="page-header">
        <a href="../index.html" class="logo">EPIC Foundation</a>
        <nav class="nav-menu">
            <a href="../auctions.html" class="nav-link">Auction</a>
            <a href="../travel-events.html" class="nav-link">Travel & Events</a>
            <a href="../about.html" class="nav-link">About Us</a>
            <a href="../contact.html" class="nav-link">Contact Us</a>
            <button class="login-btn">Login</button>
        </nav>
    </header>

    <div class="portal-wrapper">
        <a href="index.html" class="back-link">← Back to Dashboard</a>
        <h1 class="page-heading">My Bids &amp; Rounds</h1>
        <p class="page-sub">Track your active bids, auctions you've won, and rounds you've donated.</p>

        <div class="section-card" id="active-bids-section">
            <h3>🎫 Active Bids</h3>
            <div id="active-bids-container">
                <div class="empty-state">
                    <div class="em-icon">🎫</div>
                    <p>Loading...</p>
                </div>
            </div>
        </div>

        <div class="section-card" id="won-section">
            <h3>🏆 Auctions Won</h3>
            <div id="won-container">
                <div class="empty-state">
                    <div class="em-icon">🏆</div>
                    <p>Loading...</p>
                </div>
            </div>
        </div>

        <div class="section-card" id="donated-section">
            <h3>🎁 Rounds I've Donated</h3>
            <div id="donated-container">
                <div class="empty-state">
                    <div class="em-icon">🎁</div>
                    <p>Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../db.js"></script>
    <script src="../auth.js"></script>
    <script>
        (async () => {
            const session = AUTH.currentUser();
            if (!session) { window.location.href = '../login.html'; return; }
            AUTH.applyHeader('../');

            // Fetch fresh user from DB so donated rounds are current
            let user = session;
            if (typeof EPICDB !== 'undefined') {
                const allUsers = await EPICDB.getUsers() || [];
                user = allUsers.find(u => u.id === session.id) || session;
            } else {
                const allUsers = JSON.parse(localStorage.getItem('epic_users') || '[]');
                user = allUsers.find(u => u.id === session.id) || session;
            }

            // ── Active Bids ────────────────────────────────────────────────
            const bids = user.bids || [];
            const activeBidsEl = document.getElementById('active-bids-container');
            if (bids.length === 0) {
                activeBidsEl.innerHTML = `
                    <div class="empty-state">
                        <div class="em-icon">🎫</div>
                        <p>You haven't placed any bids yet.</p>
                        <a href="../auctions.html" class="browse-btn">Browse Auctions</a>
                    </div>`;
            } else {
                activeBidsEl.innerHTML = bids.slice().reverse().map(b => `
                    <a href="../auction-rounds/pebble-beach-round-2.html?id=${b.auctionId}" class="bid-row">
                        <div class="bid-title">
                            <span>⛳</span>
                            <span>${b.title || b.auctionId}</span>
                            <span class="bid-status status-active">Active</span>
                        </div>
                        <span class="bid-amount">$${b.amount.toLocaleString()}</span>
                    </a>`).join('');
            }

            // ── Auctions Won ───────────────────────────────────────────────
            const purchases = user.purchases || [];
            const wonEl = document.getElementById('won-container');
            if (purchases.length === 0) {
                wonEl.innerHTML = `
                    <div class="empty-state">
                        <div class="em-icon">🏆</div>
                        <p>You haven't won any auctions yet. Keep bidding!</p>
                    </div>`;
            } else {
                wonEl.innerHTML = purchases.map(p => `
                    <div class="bid-row" style="cursor:default;">
                        <div class="bid-title">
                            <span>🏆</span>
                            <div>
                                <span style="display:block;font-weight:600;">${p.title || p.auctionId}</span>
                                <span style="font-size:0.76rem;color:#888;">${p.course ? p.course + ' · ' : ''}${p.date || ''}</span>
                            </div>
                            <span class="bid-status status-won">Won</span>
                        </div>
                        <span class="bid-amount">$${(p.amount || 0).toLocaleString()}</span>
                    </div>`).join('');
            }

            // ── Donated Rounds ─────────────────────────────────────────────
            const donated = user.donatedRounds || [];
            const donatedEl = document.getElementById('donated-container');
            if (donated.length === 0) {
                donatedEl.innerHTML = `
                    <div class="empty-state">
                        <div class="em-icon">🎁</div>
                        <p style="color:#888;">No donated rounds on your profile yet.</p>
                        <p style="font-size:0.78rem;color:#bbb;">When your donated rounds are entered by the EPIC team, they will appear here.</p>
                    </div>`;
            } else {
                donatedEl.innerHTML = donated.map(d => `
                    <div class="bid-row" style="cursor:default; background:#fafff7;">
                        <div class="bid-title">
                            <span>🎁</span>
                            <div>
                                <span style="display:block;font-weight:600;">${d.title || d.auctionId}</span>
                                <span style="font-size:0.76rem;color:#888;">${d.course ? d.course + ' · ' : ''}Won by ${d.winnerName || d.winnerEmail || 'a member'} · ${d.date || ''}</span>
                            </div>
                            <span class="bid-status" style="background:#e8f8f0;color:#1a9e5c;">Donated</span>
                        </div>
                        <span class="bid-amount" style="color:#1a9e5c;">$${(d.amount || 0).toLocaleString()}</span>
                    </div>`).join('');
            }
        })();
    </script>
</body>

</html>
